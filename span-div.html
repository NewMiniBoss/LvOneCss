
<!doctype html>
<html>

	<head>
		<title>Span e Div</title>
		<meta charset="utf-8" />
		
		<style type="text/css">

			#menu {background-color: gray; }

			#conteudo-principal {background-color: blue; }

			#rodape {border: 1px solid gray}

		</style>

	</head>

	<body>
		<div id="menu">
			Home | Quem Somos | Contato 
		</div>

		<div id="conteudo-principal">
			<h2>Conteudo do site</h2>
			<p>Online</p>
		</div>

		<div id="rodape">
			Todos os <span class="verde">direitos </span> reservadors
		</div>
		
	</body>

</html>
