<!doctype html>
<html>

	<head>
		<title>Formataçao de Textos</title>
		<meta charset="utf-8" />
		
		<style type="text/css">

			div {font-size: 60px;}

			p { font-size: 30px ;
				font-family: Georgia }

			.texto { font-size: 16px; /*px, %, em}*/}

			.negrito { font-weight: bold; }

			.estilo { /*font-style: oblique;*/
					  font-style: italic; }

			.texto-padrao { font:bold 40px "Palatino Linotype","Book Antiqua", Palatino,serif }

			.formatacao { text-decoration: underline; }
		</style>

	</head>

	<body>
		<div>
			<p class="texto">Lorem ipsum dolor sit amet, consectetur adipiscing elit. <span class="formatacao">Cras iaculis erat vel risus porttitor ornare. In blandit ligula nec molestie congue.</span></p>

			<p class="negrito">	Conteudo 1</p>

			<p class="estilo">	Conteudo 2</p>

			<p class="texto-padrao"> Conteudo 3</p>
		</div>
	</body>

</html>
